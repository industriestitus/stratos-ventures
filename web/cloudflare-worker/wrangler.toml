name = "yahoo-finance-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "SYNC_DATA"
id = "78d0e84e13da47cbbe0d13ea57361c9e"

[[d1_databases]]
binding = "DB"
database_name = "stratos-ventures-db"
database_id = "52a43c92-6fc1-4f00-ab14-7a98e6a88a66"

# Required secrets (set via `wrangler secret put`):
#   FMP_KEY     — FMP API key for /proxy/fmp/* (server-side, never sent to client)
#   FINNHUB_KEY — Finnhub API key for /proxy/finnhub/* (server-side, never sent to client)
#
# Optional env vars:
#   ALLOWED_ORIGINS — comma-separated extra origins (e.g. "https://stratos.example.com")
